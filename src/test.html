<html>

<body>

    <form id="form">

        <input type="file" id="avatar" />

        <button type="submit">Upload</button>

    </form>

        const form = document.getElementById('form')

        form.addEventListener('submit', async (e) => {

            e.preventDefault()

            const data = new FormData()

            data.append(

                document.getElementById('avatar').files[0]
            )
            console.log("After append")
            console.log(data)
            const response = await fetch(
                'http://localhost:3000/user/me/avatar',
                {
                    method: 'POST',

                    headers: {
                        Authorization: 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJfaWQiOiI2YTBhZTY0M2YxNmViZGM3N2Q4ODE0NzEiLCJpYXQiOjE3NzkxODk2OTN9.uvJgW_MvGt8imHjL4CGFPiU-j5wgfzMDDAPEYf_tvDk'
                    },

                    body: data
                }
            )

            console.log(await response.json())
        })

    </script>

</body>

</html>
